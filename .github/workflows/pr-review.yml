name: PR Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Code & Security Review
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/merge', inputs.pr_number) || github.sha }}

      - name: Run PR Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Review the changes in this pull request. Run all steps below and post a single consolidated comment on the PR. Do not make any commits or file changes — this is a review only.

            Step 1 — Code Review:
            Use the agent defined in @.claude/agents/code-reviewer.md to review all changed files for code quality, correctness, maintainability, and adherence to project standards.

            Step 2 — Code Standards Check:
            Verify all changed files comply with the rules in @.claude/rules/code-standards.md. Flag any violations with the file and line number.

            Output format:
            Post one PR comment structured as:
            ## PR Review

            ### Code Review
            <findings from Step 1>

            ### Code Standards
            <findings from Step 2>

            If a section finds no issues, say so explicitly rather than omitting it.
